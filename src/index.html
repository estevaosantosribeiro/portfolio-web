<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="utf-8">
  <title>Estevão Santos — Portfólio</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Portfólio de Estevão Santos — desenvolvedor criativo focado em experiências digitais premium.">
  <meta name="theme-color" content="#f7f6f3" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#111110" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Fonts: Poppins (display) + Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <!-- Prevent FOUC: apply stored theme before render -->
  <script>
    (function () {
      const stored = localStorage.getItem('theme');
      const preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', stored || preferred);
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
