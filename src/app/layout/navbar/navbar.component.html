<header class="navbar" [class.navbar--scrolled]="scrolled()" role="banner">
  <ui-container size="2xl">
    <nav class="navbar__inner" aria-label="Navegação principal">

      <!-- Logo / Wordmark -->
      <button class="navbar__logo" (click)="navigate('#inicio')" aria-label="Estevão Santos — início" type="button">
        <ui-profile name="Estevão Santos" avatarUrl="profile.jpeg" [verified]="true"></ui-profile>
      </button>

      <!-- Desktop links -->
      <ul class="navbar__links" role="list">
        @for (link of links; track link.anchor) {
          <li>
            <button
              class="navbar__link"
              (click)="navigate(link.anchor)"
              type="button"
            >{{ link.label }}</button>
          </li>
        }
      </ul>

      <!-- Right side actions -->
      <div class="navbar__actions">
        <!-- Theme toggle -->
        <button
          class="navbar__theme-toggle"
          (click)="themeService.toggle()"
          [attr.aria-label]="themeService.current() === 'light' ? 'Ativar modo escuro' : 'Ativar modo claro'"
          type="button"
        >
          @if (themeService.current() === 'light') {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          } @else {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          }
        </button>

        <!-- CTA -->
        <ui-button variant="primary" size="sm" ariaLabel="Fale comigo" (clicked)="openWhatsApp()">
          Fale comigo
        </ui-button>

        <!-- Hamburger (mobile) -->
        <button
          class="navbar__hamburger"
          [class.navbar__hamburger--open]="menuOpen()"
          (click)="toggleMenu()"
          [attr.aria-expanded]="menuOpen()"
          aria-controls="mobile-menu"
          aria-label="Abrir menu"
          type="button"
        >
          <span></span>
          <span></span>
        </button>
      </div>

    </nav>
  </ui-container>
</header>

<!-- Mobile drawer -->
<div
  id="mobile-menu"
  class="navbar__mobile"
  [class.navbar__mobile--open]="menuOpen()"
  role="dialog"
  aria-modal="true"
  aria-label="Menu de navegação"
>
  <ul class="navbar__mobile-links" role="list">
    @for (link of links; track link.anchor) {
      <li>
        <button
          class="navbar__mobile-link"
          (click)="navigate(link.anchor)"
          type="button"
        >{{ link.label }}</button>
      </li>
    }
  </ul>
  <div class="navbar__mobile-cta">
    <ui-button variant="primary" size="lg" (clicked)="openWhatsApp()">
      Fale comigo
    </ui-button>
  </div>
</div>

<!-- Mobile backdrop -->
@if (menuOpen()) {
  <div
    class="navbar__backdrop"
    (click)="closeMenu()"
    aria-hidden="true"
  ></div>
}
